# ================================================================
# PVZ小齿轮 - GitHub Actions 部署工作流
# 自动部署到 GitHub Pages + Node.js 服务器
# ================================================================

name: 部署服务器

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'server/**'
      - '个人网页.html'
  workflow_dispatch:  # 允许手动触发

jobs:
  # ===== Job 1: 部署到 GitHub Pages =====
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # 上传整个项目目录

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===== Job 2: 部署 Node.js 服务器到 VPS/服务器 =====
  # 注意：此步骤需要你有一台服务器（VPS）
  # 如果没有服务器，可以跳过此步骤，仅使用 GitHub Pages
  deploy-server:
    runs-on: ubuntu-latest
    needs: deploy-pages
    # 仅在配置了服务器时运行
    if: false
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          cd server
          npm install

      - name: 通过 SSH 部署到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: "server/*"
          target: "/var/www/pvz-server"
          strip_components: 0
          overwrite: true

      - name: 重启服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            cd /var/www/pvz-server
            npm install --production
            pm2 delete pvz-server 2>/dev/null || true
            pm2 start server.js --name pvz-server
            pm2 save

  # ===== Job 3: 部署到 Render / Railway 等云平台 =====
  # 这些平台可以免费托管 Node.js 应用
  # 详情见 README.md

# ================================================================
# 环境变量说明：
# 需要在 GitHub 仓库的 Settings > Secrets and variables > Actions 中设置：
#
# 部署到 VPS 时需要：
# - SERVER_HOST: 服务器 IP 地址
# - SERVER_USERNAME: SSH 用户名
# - SERVER_SSH_KEY: SSH 私钥
# - SERVER_PORT: SSH 端口（可选，默认 22）
#
# 应用配置（可选）：
# - ADMIN_PHONES: 管理员手机号
#
# ================================================================